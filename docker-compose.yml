services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_URL: http://localhost:8080
      MONGODB_URI: mongodb://mongo:27017/smartleads
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-change-this-secret}
      JWT_EXPIRES_IN: 7d
    ports:
      - '4000:4000'

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:80'

volumes:
  mongo_data:
